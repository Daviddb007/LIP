worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    upstream flask_v3 {
        server app_v3:8000;
    }

    upstream flask_v2 {
        server app_v2:8000;
    }

    # HTTP - ACME challenge
    server {
        listen 80;
        server_name inteligenciapublica.stonelytics.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTP - Redirigir dominios antiguos directo a HTTPS nuevo
    server {
        listen 80;
        server_name construyamos.stonelytics.tech;
        return 301 https://inteligenciapublica.stonelytics.tech$request_uri;
    }

    # HTTPS - Redirigir dominios antiguos al nuevo
    server {
        listen 443 ssl;
        http2 on;
        server_name construyamos.stonelytics.tech;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        return 301 https://inteligenciapublica.stonelytics.tech$request_uri;
    }

    # HTTPS Server - V3 como principal
    server {
        listen 443 ssl;
        http2 on;
        server_name inteligenciapublica.stonelytics.tech;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # V3 static files
        location /static/ {
            alias /app/v3-static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /favicon.ico {
            alias /app/v3-static/img/favicon.webp;
            expires 30d;
        }

        # V3 main proxy
        location / {
            proxy_pass http://flask_v3;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 30s;
            proxy_read_timeout 90s;
            proxy_send_timeout 30s;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check
        location /health {
            proxy_pass http://flask_v3;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            access_log off;
        }

        # V2 via /v2/ prefix
        location /v2/ {
            rewrite ^/v2/(.*)$ /$1 break;
            proxy_pass http://flask_v2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /v2 {
            return 301 /v2/;
        }

        # V2 static
        location /v2-static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
