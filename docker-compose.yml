services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: construyamos_app
    restart: always
    environment:
      - FLASK_CONFIG=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
      - CACHE_TYPE=RedisCache
      - CACHE_REDIS_URL=redis://redis:6379/1
      - PORT=8000
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - construyamos_network
    volumes:
      - app_logs:/app/logs

  db:
    image: postgres:16-alpine
    container_name: construyamos_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - construyamos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: construyamos_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - construyamos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: construyamos_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - app_static:/app/static:ro
    depends_on:
      - app
    networks:
      - construyamos_network

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_static:

networks:
  construyamos_network:
    driver: bridge
